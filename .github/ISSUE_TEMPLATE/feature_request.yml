name: Feature request
description: Suggest a new capability for GrantPath
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user problem or workflow gap does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Operational impact
      description: Explain why this matters for admins, security or IAM teams.
