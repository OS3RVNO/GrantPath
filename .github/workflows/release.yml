name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  windows-package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r backend/requirements-dev.txt

      - name: Build Windows package
        run: .\scripts\build-windows.ps1

      - name: Archive Windows package
        run: Compress-Archive -Path .\dist\windows\GrantPath\* -DestinationPath .\dist\grantpath-windows-${{ github.ref_name }}.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: grantpath-windows
          path: dist/grantpath-windows-${{ github.ref_name }}.zip

  source-bundles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source archive
        run: |
          git archive --format=tar.gz --output grantpath-source-${GITHUB_REF_NAME}.tar.gz HEAD
          zip -r grantpath-source-${GITHUB_REF_NAME}.zip . \
            -x ".git/*" ".venv/*" "frontend/node_modules/*" "frontend/dist/*" "backend/data*" "build/*" "dist/*"

      - name: Upload source artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grantpath-source
          path: |
            grantpath-source-${{ github.ref_name }}.tar.gz
            grantpath-source-${{ github.ref_name }}.zip

  publish-release:
    needs:
      - windows-package
      - source-bundles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_v0.1.0.md
          files: |
            artifacts/grantpath-windows/*.zip
            artifacts/grantpath-source/*.tar.gz
            artifacts/grantpath-source/*.zip
